webdriver {
  driver = chrome
  base.url = "http://localhost:3000"
  autodownload = true

  capabilities {
    "goog:chromeOptions" {
      args = [
        "--start-maximized",
        "--disable-notifications",
        "--remote-allow-origins=*",
        "--no-sandbox",
        "--disable-infobars",
        "--disable-extensions",
        "--disable-gpu",
        "--ignore-certificate-errors"
      ]
    }
  }

  timeouts {
    implicitlywait = 5000
    fluentwait = 10000
  }
}

headless.mode = false

serenity {
  project.name = "FleetGuard E2E Tests"
  test.root = "com.fleetguard.e2e"
  compress.filenames = false
  take.screenshots = AFTER_EACH_STEP
  report.show.step.details = true
}

wait.for.timeout = 10000
